services:
  backend:
    build:
      context: ./backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    expose:
      - "8000"
    volumes:
      - ./backend/knowledge:/app/knowledge
      - ./backend/data:/app/data

  web:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./deploy/nginx/server.conf:/etc/nginx/conf.d/default.conf:ro
