<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="portfolio-backend-url" content="" />
  <title>Runyu Ma | Homepage (Beta)</title>
  <meta
    name="description"
    content="Runyu Ma's professional homepage — researcher, AI inference engineer, and machine learning practitioner."
  />
  <link rel="stylesheet" href="css/beta.css?v=20260331" />
</head>
<body>
  <header class="beta-header">
    <a href="beta.html" class="beta-logo">Runyu Ma</a>
    <nav class="beta-nav">
      <a href="experience.html" id="nav-experience">Experience</a>
      <a href="publications.html" id="nav-publications">Publications</a>
      <a href="https://github.com/yourexpress" target="_blank" rel="noopener">GitHub</a>
      <a class="beta-nav-resume" id="header-resume" href="#" hidden title="Download Resume" aria-label="Download Resume">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="12" y1="18" x2="12" y2="12"/><polyline points="9 15 12 18 15 15"/></svg>
      </a>
    </nav>
    <div class="beta-lang-toggle" aria-label="Language switcher">
      <button type="button" class="beta-lang-btn" data-locale="en">EN</button>
      <button type="button" class="beta-lang-btn" data-locale="zh">中文</button>
    </div>
  </header>

  <!-- News ticker -->
  <div class="news-ticker" id="news-ticker" hidden>
    <span class="news-ticker-label" id="news-ticker-label">News</span>
    <div class="news-ticker-track">
      <div class="news-ticker-content" id="news-ticker-content"></div>
    </div>
  </div>

  <main class="beta-main">
    <!-- ===== PART 1: Personal Information Zone ===== -->
    <section class="profile-zone">

      <!-- Row 1: Hero + Sidebar -->
      <div class="profile-row profile-row-top">
        <!-- Hero: Name + Title + Description + CTA -->
        <div class="profile-hero">
          <h1 class="profile-name" id="profile-name">Runyu Ma</h1>
          <p class="profile-headline" id="profile-headline">
            Researcher, AI Inference Engineer, Machine Learning Engineer
          </p>
          <div class="profile-description" id="profile-description"></div>
          <div class="profile-quick-links">
            <a href="experience.html" class="quick-link-btn quick-link-primary" id="link-experience">
              View Experience
            </a>
            <a href="publications.html" class="quick-link-btn" id="link-publications">
              Publications
            </a>
          </div>
        </div>

        <!-- Sidebar: Bio Summary + Contact Info -->
        <div class="profile-sidebar">
          <div class="profile-card sidebar-card" id="card-about">
            <h2 class="card-title" id="about-title">Bio Summary</h2>
            <div class="card-body" id="about-paragraphs"></div>
          </div>
          <div class="profile-card sidebar-card" id="card-contact">
            <h2 class="card-title" id="contact-title">Contact Info</h2>
            <div class="card-body" id="contact-list"></div>
          </div>
        </div>
      </div>

      <!-- Row 2: Education + Skills -->
      <div class="profile-row profile-row-mid">
        <div class="profile-card" id="card-education">
          <h2 class="card-title" id="education-title">Education</h2>
          <div class="card-body" id="education-list"></div>
        </div>
        <div class="profile-card" id="card-skills">
          <h2 class="card-title" id="skills-title">Skills</h2>
          <div class="card-body">
            <div class="skill-tags" id="skills-list"></div>
          </div>
        </div>
      </div>

      <!-- Row 3: Experience Highlights -->
      <div class="profile-row profile-row-bottom">
        <div class="profile-card" id="card-experience">
          <h2 class="card-title" id="experience-title">Experience Highlights</h2>
          <div class="card-body" id="experience-list"></div>
        </div>
      </div>

    </section>
  </main>

  <!-- ===== PART 2: Sticky Chat Bar ===== -->
  <section class="chat-zone" id="chat-zone">
    <!-- Centered pill bar for vertical resize -->
    <div class="chat-zone-pill-handle" id="chat-zone-resize-handle" role="separator" aria-label="Resize chat panel" tabindex="0">
      <div class="pill-bar"></div>
    </div>

    <div class="chat-zone-inner">
      <div class="chat-zone-body" id="chat-zone-body">
        <div class="chat-messages" id="chat-messages" role="log" aria-live="polite"></div>
      </div>

      <div class="chat-suggestions" id="chat-suggestions">
        <button type="button" class="suggestion-btn" data-question="What are your main research interests?">Ask about research focus</button>
        <button type="button" class="suggestion-btn" data-question="What projects is he building now?">What projects is he building now?</button>
        <button type="button" class="suggestion-btn" data-question="Summarize his publications.">Summarize publications</button>
        <button type="button" class="suggestion-btn" data-question="How does this fit ML infra roles?">How does this fit ML infra roles?</button>
      </div>

      <form class="chat-input-form" id="chat-form" autocomplete="off" novalidate>
        <div class="chat-input-wrapper">
          <button type="button" class="chat-clear-pill" id="chat-clear-btn" title="New conversation" aria-label="Start a new conversation">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4l16 16"/><path d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10 10-4.5 10-10S17.5 2 12 2z"/></svg>
          </button>
          <textarea
            id="chat-input"
            class="chat-input"
            rows="1"
            maxlength="1000"
            placeholder="Ask about experience, publications, projects, or resume..."
            aria-label="Your message"
          ></textarea>
          <button type="submit" class="chat-send-btn" id="send-btn" aria-label="Send message" disabled>
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20V4"/><path d="M5 11l7-7 7 7"/></svg>
          </button>
        </div>
      </form>

      <div class="chat-footer">
        <span class="chat-char-count" id="chat-char-count">0 / 1000</span>
        <span class="chat-disclaimer" id="chat-disclaimer">Context kept for this session only.</span>
      </div>
    </div>
  </section>

  <script src="js/app-config.js?v=20260331"></script>
  <script src="js/beta-home.js?v=20260331"></script>
  <script src="js/beta-chat.js?v=20260331"></script>
</body>
</html>
